name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ~
            if [ ! -d "web_proto/.git" ]; then
              rm -rf web_proto
              git clone https://${{ secrets.GH_PAT }}@github.com/Ralarco/fullparnert-web.git web_proto
            else
              cd web_proto
              git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/Ralarco/fullparnert-web.git
              git pull origin main
            fi
            
            cd ~/web_proto
            [ -f ~/.bashrc ] && source ~/.bashrc
            export PATH=$PATH:/usr/local/bin
            npm install
            npm run build
            touch tmp/restart.txt
